name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (example: v0.18.0)"
        required: false

permissions:
  contents: write

concurrency:
  group: release-macos-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPDATES_REPO_TOKEN: ${{ secrets.UPDATES_REPO_TOKEN }}
      TOKENBAR_SPARKLE_PUBLIC_KEY: ${{ vars.TOKENBAR_SPARKLE_PUBLIC_KEY || secrets.TOKENBAR_SPARKLE_PUBLIC_KEY }}
      TOKENBAR_UPDATES_REPO: ${{ vars.TOKENBAR_UPDATES_REPO }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode 26.1.1 (if present) or fallback to default
        shell: bash
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          /usr/bin/xcodebuild -version

      - name: Resolve tag and release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="${GITHUB_REF_NAME}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$TAG" || "$TAG" != v* ]]; then
            echo "Release tag must start with v (example: v0.18.0)." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          source version.env
          if [[ "${MARKETING_VERSION}" != "${VERSION}" ]]; then
            echo "version.env MARKETING_VERSION=${MARKETING_VERSION} does not match tag ${TAG}." >&2
            exit 1
          fi

          TARGET_REPO="${TOKENBAR_UPDATES_REPO:-${GITHUB_REPOSITORY}}"
          FEED_URL="https://raw.githubusercontent.com/${TARGET_REPO}/main/appcast.xml"
          DOWNLOAD_PREFIX="https://github.com/${TARGET_REPO}/releases/download/${TAG}/"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_repo=${TARGET_REPO}" >> "$GITHUB_OUTPUT"
          echo "feed_url=${FEED_URL}" >> "$GITHUB_OUTPUT"
          echo "download_prefix=${DOWNLOAD_PREFIX}" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets and variables
        env:
          APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
          UPDATES_REPO_TOKEN: ${{ secrets.UPDATES_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()

          [[ -z "${APPLE_SIGNING_CERT_BASE64}" ]] && missing+=("APPLE_SIGNING_CERT_BASE64")
          [[ -z "${APPLE_SIGNING_CERT_PASSWORD}" ]] && missing+=("APPLE_SIGNING_CERT_PASSWORD")
          [[ -z "${APP_STORE_CONNECT_API_KEY_P8}" ]] && missing+=("APP_STORE_CONNECT_API_KEY_P8")
          [[ -z "${APP_STORE_CONNECT_KEY_ID}" ]] && missing+=("APP_STORE_CONNECT_KEY_ID")
          [[ -z "${APP_STORE_CONNECT_ISSUER_ID}" ]] && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [[ -z "${SPARKLE_PRIVATE_KEY}" ]] && missing+=("SPARKLE_PRIVATE_KEY")
          [[ -z "${TOKENBAR_SPARKLE_PUBLIC_KEY}" ]] && missing+=("TOKENBAR_SPARKLE_PUBLIC_KEY (repository variable)")
          if [[ "${TARGET_REPO}" != "${GITHUB_REPOSITORY}" && -z "${UPDATES_REPO_TOKEN}" ]]; then
            missing+=("UPDATES_REPO_TOKEN (required for publishing to ${TARGET_REPO})")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secrets/variables:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Prepare Sparkle key file
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/sparkle-private-key.txt"
          printf '%s\n' "${SPARKLE_PRIVATE_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"
          echo "SPARKLE_PRIVATE_KEY_FILE=${KEY_FILE}" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="${RUNNER_TEMP}/tokenbar-build.keychain-db"
          KEYCHAIN_PASSWORD="$(/usr/bin/uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"

          CERT_PATH="${CERT_PATH}" APPLE_SIGNING_CERT_BASE64="${APPLE_SIGNING_CERT_BASE64}" /usr/bin/python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_path = Path(os.environ["CERT_PATH"])
          cert_b64 = os.environ["APPLE_SIGNING_CERT_BASE64"]
          cert_path.write_bytes(base64.b64decode(cert_b64))
          PY

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_SIGNING_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          APP_IDENTITY="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | /usr/bin/awk -F\" '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "${APP_IDENTITY}" ]]; then
            echo "Could not find a Developer ID Application identity in imported certificate." >&2
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" || true
            exit 1
          fi

          echo "APP_IDENTITY=${APP_IDENTITY}" >> "$GITHUB_ENV"
          echo "TOKENBAR_CODESIGN_KEYCHAIN=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Install Sparkle tools
        shell: bash
        run: |
          set -euo pipefail

          if command -v generate_appcast >/dev/null 2>&1 && command -v sign_update >/dev/null 2>&1; then
            exit 0
          fi

          SPARKLE_DIR="${RUNNER_TEMP}/Sparkle"
          /usr/bin/git clone --depth 1 https://github.com/sparkle-project/Sparkle.git "${SPARKLE_DIR}"
          /usr/bin/xcodebuild \
            -project "${SPARKLE_DIR}/Sparkle.xcodeproj" \
            -scheme generate_appcast \
            -configuration Release \
            -derivedDataPath "${SPARKLE_DIR}/.derived" \
            build
          /usr/bin/xcodebuild \
            -project "${SPARKLE_DIR}/Sparkle.xcodeproj" \
            -scheme sign_update \
            -configuration Release \
            -derivedDataPath "${SPARKLE_DIR}/.derived" \
            build
          BIN_DIR="${SPARKLE_DIR}/.derived/Build/Products/Release"
          export PATH="${BIN_DIR}:${PATH}"
          echo "${BIN_DIR}" >> "$GITHUB_PATH"
          command -v generate_appcast >/dev/null 2>&1
          command -v sign_update >/dev/null 2>&1

      - name: Build, sign, and notarize
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TOKENBAR_FEED_URL: ${{ steps.meta.outputs.feed_url }}
        shell: bash
        run: |
          set -euo pipefail
          ./Scripts/sign-and-notarize.sh
          TOKENBAR_SKIP_PACKAGE=1 ./Scripts/build_dmg.sh

      - name: Publish app release assets
        env:
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="TokenBar-${VERSION}.zip"
          DSYM_ZIP="TokenBar-${VERSION}.dSYM.zip"
          DMG="TokenBar-${VERSION}.dmg"

          if [[ -n "${UPDATES_REPO_TOKEN}" ]]; then
            export GH_TOKEN="${UPDATES_REPO_TOKEN}"
          fi

          if gh release view "${TAG}" --repo "${TARGET_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ZIP}" "${DSYM_ZIP}" "${DMG}" --repo "${TARGET_REPO}" --clobber
          else
            gh release create "${TAG}" "${ZIP}" "${DSYM_ZIP}" "${DMG}" \
              --repo "${TARGET_REPO}" \
              --title "TokenBar ${VERSION}" \
              --target main \
              --generate-notes
          fi

      - name: Generate and verify appcast
        env:
          SPARKLE_DOWNLOAD_URL_PREFIX: ${{ steps.meta.outputs.download_prefix }}
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="TokenBar-${VERSION}.zip"
          export SPARKLE_RELEASE_VERSION="${VERSION}"

          if [[ -n "${UPDATES_REPO_TOKEN}" ]]; then
            export GH_TOKEN="${UPDATES_REPO_TOKEN}"
          fi

          LOADED_TARGET_APPCAST=0
          if gh api "repos/${TARGET_REPO}/contents/appcast.xml" --jq .content > "${RUNNER_TEMP}/appcast.b64" 2>/dev/null; then
            /usr/bin/python3 -c 'import base64, pathlib, sys; pathlib.Path(sys.argv[2]).write_bytes(base64.b64decode(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8").replace("\n", "")))' \
              "${RUNNER_TEMP}/appcast.b64" appcast.xml
            LOADED_TARGET_APPCAST=1
            echo "Loaded appcast.xml from ${TARGET_REPO}."
          else
            /usr/bin/printf '%s\n' \
              '<?xml version="1.0" encoding="utf-8" standalone="yes"?>' \
              '<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">' \
              '  <channel>' \
              '    <title>TokenBar</title>' \
              '  </channel>' \
              '</rss>' > appcast.xml
            echo "Could not load appcast.xml from ${TARGET_REPO}; initialized a new appcast feed."
          fi

          # Always regenerate the appcast entry for this version so enclosure length/signature
          # reflect the latest uploaded release assets (including clobbered uploads).
          ./Scripts/make_appcast.sh "${ZIP}" "${{ steps.meta.outputs.feed_url }}"

          ./Scripts/verify_appcast.sh "${VERSION}"

      - name: Upload appcast asset to release
        env:
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${UPDATES_REPO_TOKEN}" ]]; then
            export GH_TOKEN="${UPDATES_REPO_TOKEN}"
          fi
          gh release upload "${{ steps.meta.outputs.tag }}" appcast.xml --repo "${TARGET_REPO}" --clobber

      - name: Commit appcast.xml to main
        env:
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          COMMIT_MESSAGE="docs: update appcast for ${VERSION}"

          if [[ -n "${UPDATES_REPO_TOKEN}" ]]; then
            export GH_TOKEN="${UPDATES_REPO_TOKEN}"
          fi

          if [[ "${TARGET_REPO}" == "${GITHUB_REPOSITORY}" ]]; then
            GENERATED_APPCAST="${RUNNER_TEMP}/appcast.xml.generated"
            cp appcast.xml "${GENERATED_APPCAST}"

            /usr/bin/git fetch origin main
            /usr/bin/git checkout -B main origin/main
            cp "${GENERATED_APPCAST}" appcast.xml

            if /usr/bin/git diff --quiet -- appcast.xml; then
              echo "No appcast changes to commit."
              exit 0
            fi

            /usr/bin/git config user.name "github-actions[bot]"
            /usr/bin/git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            /usr/bin/git add appcast.xml
            /usr/bin/git commit -m "${COMMIT_MESSAGE}"
            /usr/bin/git push origin HEAD:main
            exit 0
          fi

          CONTENT_B64="$(/usr/bin/base64 < appcast.xml | /usr/bin/tr -d '\n')"
          EXISTING_SHA="$(gh api "repos/${TARGET_REPO}/contents/appcast.xml" --jq .sha 2>/dev/null || true)"

          PAYLOAD="${RUNNER_TEMP}/appcast-update.json"
          if [[ -n "${EXISTING_SHA}" ]]; then
            /usr/bin/jq -n \
              --arg message "${COMMIT_MESSAGE}" \
              --arg content "${CONTENT_B64}" \
              --arg branch "main" \
              --arg sha "${EXISTING_SHA}" \
              '{message: $message, content: $content, branch: $branch, sha: $sha}' > "${PAYLOAD}"
          else
            /usr/bin/jq -n \
              --arg message "${COMMIT_MESSAGE}" \
              --arg content "${CONTENT_B64}" \
              --arg branch "main" \
              '{message: $message, content: $content, branch: $branch}' > "${PAYLOAD}"
          fi

          gh api "repos/${TARGET_REPO}/contents/appcast.xml" -X PUT --input "${PAYLOAD}" >/dev/null
          echo "Committed appcast.xml to ${TARGET_REPO}:main"
