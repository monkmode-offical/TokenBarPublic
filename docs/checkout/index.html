<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buy TokenBar Lifetime</title>
  <style>
    html, body { margin:0; padding:0; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#0b1020; color:#f8fafc; }
    .wrap { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(620px,100%); background:#111827; border:1px solid rgba(148,163,184,.25); border-radius:16px; padding:28px; }
    h1 { margin:0 0 8px; font-size:30px; }
    p { margin:0 0 12px; color:#94a3b8; line-height:1.45; }
    button { border:1px solid rgba(34,197,94,.45); background:rgba(34,197,94,.2); color:#dcfce7; border-radius:10px; padding:12px 16px; font-size:15px; cursor:pointer; }
    .status { margin-top:10px; color:#fbbf24; min-height:20px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>TokenBar Lifetime License</h1>
      <p>One-time payment of $5. Includes one-device activation and refund-based key revocation.</p>
      <button id="buyBtn">Buy for $5</button>
      <div class="status" id="status"></div>
    </section>
  </main>
  <script>
    const buyBtn = document.getElementById("buyBtn");
    const status = document.getElementById("status");

    buyBtn.addEventListener("click", async () => {
      buyBtn.disabled = true;
      status.textContent = "Creating secure checkout session…";
      try {
        const response = await fetch("/api/checkout/session", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({}),
        });
        const payload = await response.json();
        if (!response.ok || !payload.checkout_url) {
          throw new Error(payload.message || payload.error || "Could not create checkout session");
        }
        window.location.href = payload.checkout_url;
      } catch (error) {
        status.textContent = String(error);
        buyBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
